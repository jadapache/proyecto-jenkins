apiVersion: apps/v1
kind: Deployment
metadata:
  name: proyectojenkins
spec:
  replicas: 3
  selector:
    matchLabels:
      app: proyectojenkins
  template:
    metadata:
      labels:
        app: proyectojenkins
    spec:
      containers:
      - name: proyectojenkins
        image: jadapache/proyectojenkins:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "500m"
